name: Create and publish a Docker image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build, for example v1.0.1"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/huangzheng2016/the-only-mirror

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve image tags
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "${{ github.event.inputs.tag }}" ]; then
            echo "workflow_dispatch requires a tag input" >&2
            exit 1
          fi
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            ref="${{ github.event.inputs.tag }}"
          else
            ref="${{ github.ref_name }}"
          fi
          if [[ "$ref" == *"-"* ]]; then
            latest=latest-beta
          else
            latest=latest
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "version_label=org.opencontainers.image.version=$ref" >> "$GITHUB_OUTPUT"
          echo "revision_label=org.opencontainers.image.revision=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "source_label=org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.ref }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

      - name: Enable QEMU emulation
        run: docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Set up Docker Buildx
        run: |
          docker buildx inspect ci-builder >/dev/null 2>&1 || docker buildx create --name ci-builder --use
          docker buildx use ci-builder
          docker buildx inspect --bootstrap

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --target prod \
            --push \
            --tag "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.ref }}" \
            --tag "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.latest }}" \
            --label "${{ steps.meta.outputs.version_label }}" \
            --label "${{ steps.meta.outputs.revision_label }}" \
            --label "${{ steps.meta.outputs.source_label }}" \
            .
