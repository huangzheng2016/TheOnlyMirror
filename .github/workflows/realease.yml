name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v1.0.1"
        required: true
        type: string

jobs:
  prepare:
    name: Resolve Release Target
    runs-on: ubuntu-latest
    outputs:
      target_tag: ${{ steps.resolve.outputs.target_tag }}
    steps:
      - name: Resolve target tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "${{ github.event.inputs.tag }}" ]; then
            echo "workflow_dispatch requires a tag input" >&2
            exit 1
          fi
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            target_tag="${{ github.event.inputs.tag }}"
          else
            target_tag="${{ github.ref_name }}"
          fi
          echo "target_tag=$target_tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -v -trimpath -o the-only-mirror ./

      - name: Package archive
        env:
          ASSET_NAME: the-only-mirror-${{ needs.prepare.outputs.target_tag }}-${{ matrix.goos }}-${{ matrix.goarch }}
        run: |
          mkdir -p dist
          tar -czf "dist/${ASSET_NAME}.tar.gz" the-only-mirror

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    permissions:
      contents: write

    steps:
      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ needs.prepare.outputs.target_tag }}" >/dev/null 2>&1 || \
            gh release create "${{ needs.prepare.outputs.target_tag }}" --title "${{ needs.prepare.outputs.target_tag }}" --notes ""
          gh release upload "${{ needs.prepare.outputs.target_tag }}" dist/*.tar.gz --clobber
